name: Discord Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BRANCH="${GITHUB_REF##*/}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          FILES_CHANGED="${{ toJson(github.event.head_commit.modified) }}"

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"content\": \"<@&1487154403529199787> 🚀 Nouveau commit sur **AITools Pro** !\",
                 \"embeds\": [{
                   \"title\": \"📦 Push sur \`${BRANCH}\` — \`${COMMIT_SHA}\`\",
                   \"description\": \"**${COMMIT_MSG}**\",
                   \"color\": 7340031,
                   \"fields\": [
                     {\"name\": \"✍️ Auteur\", \"value\": \"${AUTHOR}\", \"inline\": true},
                     {\"name\": \"🌿 Branche\", \"value\": \"\`${BRANCH}\`\", \"inline\": true}
                   ],
                   \"url\": \"${COMMIT_URL}\",
                   \"footer\": {\"text\": \"Djangogo33/AITools\"}
                 }]
               }" \
               "$DISCORD_WEBHOOK_URL"